name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'issues/**'
      - 'website/**'
      - '_legacy/**'

jobs:
  build:
    # Only run if commit message contains [build] or [ci]
    if: contains(github.event.head_commit.message, '[build]') || contains(github.event.head_commit.message, '[ci]')

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: bun install
        working-directory: frontend

      - name: Build
        run: wails build
