name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'issues/**'
      - 'website/**'
      - '_legacy/**'

jobs:
  build:
    if: contains(github.event.head_commit.message, '[build]') || contains(github.event.head_commit.message, '[ci]')

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Wails (Windows)
        if: runner.os == 'Windows'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Nix (Linux)
        if: runner.os == 'Linux'
        uses: cachix/install-nix-action@v27

      - name: Install Wails (Linux)
        if: runner.os == 'Linux'
        run: nix-shell -p go --run "go install github.com/wailsapp/wails/v2/cmd/wails@latest"

      - name: Install frontend deps
        run: bun install
        working-directory: frontend

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: wails build

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: nix-shell -p pkg-config gtk3 webkit2gtk_4_0 gobject-introspection --run "export PATH=$HOME/go/bin:$PATH && wails build"
